databases:
  # 1. The PostgreSQL Database
  - name: sentinel-db
    plan: free
    postgresMajorVersion: "15"

services:
  # 2. The Backend API Server
  - name: sentinel-api
    type: web
    plan: free
    env: node
    repo: https://github.com/ArunaHarikant/EO4Urbanization.git
    rootDir: ./artifacts/api-server
    buildCommand: "pnpm install && pnpm run build"
    startCommand: "pnpm run start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # 3. The Frontend React App
  - name: sentinel-webapp
    type: web
    env: static
    repo: https://github.com/ArunaHarikant/EO4Urbanization.git
    rootDir: ./artifacts/urban-watch
    buildCommand: "pnpm install && pnpm run build"
    staticPublishPath: dist/public
    routes:
      - type: rewrite
        source: /api/*
        destination: https://sentinel-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
